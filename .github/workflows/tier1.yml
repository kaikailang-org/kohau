name: tier1

# Run kohau's tier1 fixtures against the published kaikai toolchain.
#
# kaikai ships publicly from the `kaikailang-org` Homebrew tap, so CI
# installs `kai` the same way a developer does — no token, no private
# clone, no building the compiler from source. (The compiler lives at
# `kaikailang-org/kaikai`; the user's `lnds/kaikai` is a private
# exploration repo and is NOT what CI builds against.)
#
# Runs on macOS so the Makefile's Homebrew SQLite paths
# (/opt/homebrew/opt/sqlite) are correct without overrides, matching
# the local development environment.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out kohau
        uses: actions/checkout@v4

      - name: Install kaikai (public Homebrew tap)
        run: brew install kaikailang-org/kaikai/kaikai

      - name: Install libsqlite3
        run: brew install sqlite

      - name: Toolchain versions
        run: |
          cc --version | head -1
          make --version | head -1
          kai --version

      - name: Resolve dependencies (ahu git-dep)
        # ahu is a public repo, so this clone needs no credentials.
        # Writes kai.lock pinning the resolved ahu SHA.
        run: kai install

      - name: kohau tier0 (compile module + fixtures)
        run: make tier0

      - name: kohau tier1 (run fixtures + diff outputs)
        run: make tier1
