name: tier1

# Run kohau's tier1 fixtures on GitHub's standard hosted runner.
#
# Runner: `macos-14` — a GitHub-hosted runner (free for public
# repos), NOT self-hosted or private. macOS specifically because the
# public kaikai toolchain only ships a `darwin-arm64` binary today;
# there is no Linux release, so `ubuntu-latest` would have to build
# the compiler from source. When kaikai publishes a Linux binary
# this can move to `ubuntu-latest`.
#
# kaikai ships publicly from the `kaikailang-org` Homebrew tap, so
# `kai` is installed the same way a developer installs it — no token,
# no private clone, no building the compiler from source.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out kohau
        uses: actions/checkout@v4

      - name: Install kaikai (public Homebrew tap)
        run: brew install kaikailang-org/kaikai/kaikai

      - name: Install libsqlite3
        run: brew install sqlite

      - name: Toolchain versions
        run: |
          cc --version | head -1
          make --version | head -1
          kai --version

      - name: Resolve dependencies (ahu git-dep)
        # ahu is a public repo, so this clone needs no credentials.
        run: kai install

      - name: kohau tier0 (compile module + fixtures)
        run: make tier0

      - name: kohau tier1 (run fixtures + diff outputs)
        run: make tier1
