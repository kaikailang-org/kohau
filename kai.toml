name = "kohau"
version = "0.1.0"
edition = "hanga-roa"

[dependencies]

# kohau's own tier1 fixtures import kohau's #[unstable] decls
# (sqlite.* in v1). Opting in here acknowledges the disclosure
# for the in-tree fixtures so the build is warning-free.
# Downstream consumers do the same in their own kai.toml.
[unstable]
kohau = true
sqlite = true
